name: Build Scan Agent Installer (Windows)

on:
  push:
    branches: [master]
    paths:
      - 'scan-agent/**'
      - '.github/workflows/build-scan-agent.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      # ── Source ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scan-agent/package-lock.json

      - name: Install dependencies
        working-directory: scan-agent
        run: npm ci

      # ── Bundle agent + Node 20 runtime into a single .exe ───────────────────
      - name: Build Windows executable (pkg)
        working-directory: scan-agent
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          npx @yao-pkg/pkg agent.js `
            --target node20-win-x64 `
            --output dist/claimsflow-scan-agent.exe `
            --compress GZip
          if (-not (Test-Path "dist\claimsflow-scan-agent.exe")) {
            Write-Error "pkg build failed — exe not produced"
            exit 1
          }
          $mb = [math]::Round((Get-Item "dist\claimsflow-scan-agent.exe").Length / 1MB, 1)
          Write-Host "Executable: $mb MB"

      # ── WinSW service wrapper ────────────────────────────────────────────────
      - name: Download WinSW v3
        working-directory: scan-agent
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/winsw/winsw/releases/download/v3.0.0-alpha.11/WinSW-x64.exe" `
            -OutFile winsw.exe -UseBasicParsing
          $kb = [math]::Round((Get-Item winsw.exe).Length / 1KB, 0)
          Write-Host "WinSW: $kb KB"

      # ── NSIS installer ───────────────────────────────────────────────────────
      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --yes --no-progress

      - name: Compile NSIS installer
        working-directory: scan-agent
        shell: pwsh
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          & $nsis /V2 installer.nsi
          if ($LASTEXITCODE -ne 0) { Write-Error "makensis failed ($LASTEXITCODE)"; exit 1 }
          $mb = [math]::Round((Get-Item "ClaimsFlow-Scan-Agent-Setup.exe").Length / 1MB, 1)
          Write-Host "Installer: $mb MB"

      # ── Upload artifact (always) ─────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaimsFlow-Scan-Agent-Setup
          path: scan-agent/ClaimsFlow-Scan-Agent-Setup.exe
          retention-days: 30

      # ── Publish to GitHub Releases (master pushes only) ──────────────────────
      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag  = "scan-agent-latest"
          $file = "scan-agent\ClaimsFlow-Scan-Agent-Setup.exe"
          $sha  = "${{ github.sha }}".Substring(0, 7)
          $msg  = @"
          ## ClaimsFlow Scan Agent for Windows

          Download and run **ClaimsFlow-Scan-Agent-Setup.exe** to install the local scan agent.

          ### What it does
          Installs as a Windows service on port 7420.
          Bridges your physical scanner (TWAIN, WIA, ISIS, SANE) to the ClaimsFlow web UI — including the cloud-hosted deployment on Render.

          ### Requirements
          - Windows 10 / Windows 11 (64-bit)
          - Your scanner's WIA driver (installed via Windows Update or manufacturer disc)

          ### After installation
          Open ClaimsFlow → Batch Upload → **Scan Document** — your scanner appears automatically.

          ### Uninstall
          Control Panel → Programs → ClaimsFlow Scan Agent → Uninstall

          ---
          Built from ``$sha``
          "@

          # Delete the existing release + tag so we can recreate (upsert pattern)
          gh release delete $tag --yes --repo ${{ github.repository }} 2>$null
          git push origin ":refs/tags/$tag" 2>$null

          # Small delay to let GitHub process the deletion
          Start-Sleep -Seconds 3

          # Create fresh release with the installer attached
          gh release create $tag $file `
            --repo ${{ github.repository }} `
            --title "ClaimsFlow Scan Agent — Latest" `
            --notes $msg `
            --latest
