version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Africa/Nairobi
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      nestjs:
        patterns:
          - '@nestjs/*'
      prisma:
        patterns:
          - '@prisma/*'
          - 'prisma'
      types:
        patterns:
          - '@types/*'

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Africa/Nairobi
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      radix:
        patterns:
          - '@radix-ui/*'
      react:
        patterns:
          - 'react'
          - 'react-*'
      types:
        patterns:
          - '@types/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Africa/Nairobi
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci(deps)
      include: scope

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Africa/Nairobi
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: chore(docker)
      include: scope
