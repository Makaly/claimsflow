version: 2.1

# ── Orbs ──────────────────────────────────────────────────────────────────────
orbs:
  node: circleci/node@5.2.0

# ── Reusable commands ─────────────────────────────────────────────────────────
commands:
  install_backend:
    steps:
      - node/install-packages:
          pkg-manager: npm
          app-dir: backend
          override-ci-command: npm ci --legacy-peer-deps

  install_frontend:
    steps:
      - node/install-packages:
          pkg-manager: npm
          app-dir: frontend

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── Backend build ────────────────────────────────────────────────────────────
  build-backend:
    docker:
      - image: cimg/node:20.19
    resource_class: medium
    steps:
      - checkout
      - install_backend
      - run:
          name: Generate Prisma client
          command: npx prisma generate
          working_directory: backend
      - run:
          name: Build NestJS
          command: npm run build
          working_directory: backend
      - run:
          name: Verify dist/main.js
          command: test -f dist/main.js || (echo "ERROR — dist/main.js not produced" && exit 1)
          working_directory: backend
      - persist_to_workspace:
          root: .
          paths:
            - backend/dist
            - backend/node_modules/.prisma

  # ── Frontend build ───────────────────────────────────────────────────────────
  build-frontend:
    docker:
      - image: cimg/node:20.19
    resource_class: medium
    steps:
      - checkout
      - install_frontend
      - run:
          name: Lint (non-blocking)
          command: npm run lint || true
          working_directory: frontend
      - run:
          name: Build Vite
          command: npm run build
          working_directory: frontend
      - run:
          name: Verify dist/index.html
          command: test -f dist/index.html || (echo "ERROR — Vite dist not produced" && exit 1)
          working_directory: frontend
      - persist_to_workspace:
          root: .
          paths:
            - frontend/dist

  # ── ML sidecar (Python 3.12 — matches Dockerfile) ───────────────────────────
  build-python:
    docker:
      - image: cimg/python:3.12
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Verify Python version
          command: python --version
      - run:
          name: Install dependencies
          command: pip install --upgrade pip && pip install -r requirements.txt
          working_directory: ml-sidecar
      - run:
          name: Lint (flake8, non-blocking)
          command: pip install flake8 --quiet && flake8 . --max-line-length=120 --ignore=E501,W503 || true
          working_directory: ml-sidecar
      - run:
          name: Smoke-test imports
          command: |
            python -c "
            import fastapi, uvicorn, sklearn, numpy, pydantic, scipy, PIL
            print('sklearn :', sklearn.__version__)
            print('numpy   :', numpy.__version__)
            print('All imports OK')
            "
          working_directory: ml-sidecar

  # ── Docker lint ──────────────────────────────────────────────────────────────
  lint-docker:
    docker:
      - image: hadolint/hadolint:latest-debian
    resource_class: small
    steps:
      - checkout
      - run:
          name: Lint backend Dockerfile
          command: hadolint backend/Dockerfile || true
      - run:
          name: Lint backend Dockerfile.prod
          command: hadolint backend/Dockerfile.prod || true
      - run:
          name: Lint frontend Dockerfile
          command: hadolint frontend/Dockerfile || true
      - run:
          name: Lint ml-sidecar Dockerfile
          command: hadolint ml-sidecar/Dockerfile || true

  # ── Dependency audit ─────────────────────────────────────────────────────────
  audit-deps:
    docker:
      - image: cimg/node:20.19
    resource_class: small
    steps:
      - checkout
      - install_backend
      - install_frontend
      - run:
          name: Audit backend (critical only)
          command: npm audit --omit=dev --audit-level=critical || true
          working_directory: backend
      - run:
          name: Audit frontend (critical only)
          command: npm audit --omit=dev --audit-level=critical || true
          working_directory: frontend

  # ── Windows scan agent installer (cross-compiled on Linux) ──────────────────
  build-scan-agent-installer:
    docker:
      - image: cimg/node:20.19
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
          working_directory: scan-agent
      - run:
          name: Install NSIS (Linux cross-compile to Windows .exe)
          command: |
            sudo apt-get update -qq
            sudo apt-get install -y nsis
            makensis -VERSION
      - run:
          name: Bundle Node.js + agent.js into Windows .exe (pkg)
          command: |
            mkdir -p dist
            # Build without GZip compression — packed binaries are a top trigger
            # for Windows Defender false-positives on unsigned pkg-bundled exes.
            npx @yao-pkg/pkg agent.js \
              --target node20-win-x64 \
              --output dist/claimsflow-scan-agent.exe \
              --no-bytecode \
              --public \
              --public-packages "*"
            test -f dist/claimsflow-scan-agent.exe || (echo "pkg failed" && exit 1)
            ls -lh dist/claimsflow-scan-agent.exe
          working_directory: scan-agent
      - run:
          name: Download WinSW (Windows service wrapper)
          command: |
            curl -fsSL -o winsw.exe \
              https://github.com/winsw/winsw/releases/download/v3.0.0-alpha.11/WinSW-x64.exe
            ls -lh winsw.exe
          working_directory: scan-agent
      - run:
          name: Compile NSIS installer
          command: |
            makensis -V2 installer.nsi
            test -f ClaimsFlow-Scan-Agent-Setup.exe || (echo "makensis failed" && exit 1)
            ls -lh ClaimsFlow-Scan-Agent-Setup.exe
          working_directory: scan-agent
      - store_artifacts:
          path: scan-agent/ClaimsFlow-Scan-Agent-Setup.exe
          destination: ClaimsFlow-Scan-Agent-Setup.exe
      - persist_to_workspace:
          root: .
          paths:
            - scan-agent/ClaimsFlow-Scan-Agent-Setup.exe

  # ── Publish installer to GitHub Releases ────────────────────────────────────
  publish-scan-agent-release:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Install GitHub CLI
          command: |
            type -p curl >/dev/null || sudo apt-get install -y curl
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update -qq
            sudo apt-get install -y gh
      - run:
          name: Publish to GitHub Release (scan-agent-latest)
          command: |
            if [ -z "$GITHUB_TOKEN" ]; then
              echo "GITHUB_TOKEN not set — skipping release publish."
              echo "Add a Personal Access Token (repo scope) at:"
              echo "  CircleCI → Project Settings → Environment Variables → GITHUB_TOKEN"
              exit 0
            fi
            export GH_TOKEN="$GITHUB_TOKEN"
            REPO="Makaly/claimsflow"
            TAG="scan-agent-latest"
            FILE="scan-agent/ClaimsFlow-Scan-Agent-Setup.exe"

            # Delete existing release + tag (upsert pattern)
            gh release delete "$TAG" --repo "$REPO" --yes 2>/dev/null || true
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git ":refs/tags/${TAG}" 2>/dev/null || true
            sleep 3

            gh release create "$TAG" "$FILE" \
              --repo "$REPO" \
              --title "ClaimsFlow Scan Agent — Latest" \
              --notes "Download **ClaimsFlow-Scan-Agent-Setup.exe** and run it to install the local scan agent as a Windows service on port 7420. Bridges TWAIN / WIA / ISIS / SANE scanners to the ClaimsFlow web UI.

            Built from \`${CIRCLE_SHA1:0:7}\` by CircleCI." \
              --latest

  # ── Secret scan ──────────────────────────────────────────────────────────────
  scan-secrets:
    docker:
      - image: zricethezav/gitleaks:latest
    resource_class: small
    steps:
      - checkout
      - run:
          name: Gitleaks secret scan
          command: gitleaks detect --source . --verbose || true

# ── Workflows ─────────────────────────────────────────────────────────────────
workflows:

  build-and-test:
    jobs:
      - build-backend
      - build-frontend
      - build-python
      - lint-docker
      - audit-deps
      - scan-secrets
      - build-scan-agent-installer
      - publish-scan-agent-release:
          requires:
            - build-scan-agent-installer
          filters:
            branches:
              only: master
