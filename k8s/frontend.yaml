apiVersion: apps/v1
kind: Deployment
metadata:
  name: claimsflow-frontend
  namespace: claimsflow
  labels:
    app: claimsflow
    component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: claimsflow
      component: frontend
  template:
    metadata:
      labels:
        app: claimsflow
        component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: frontend
          image: ghcr.io/cic-insurance/claimsflow-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: claimsflow-frontend
  namespace: claimsflow
spec:
  type: ClusterIP
  selector:
    app: claimsflow
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
