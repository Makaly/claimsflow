apiVersion: apps/v1
kind: Deployment
metadata:
  name: claimsflow-backend
  namespace: claimsflow
  labels:
    app: claimsflow
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: claimsflow
      component: backend
  template:
    metadata:
      labels:
        app: claimsflow
        component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: ghcr.io/cic-insurance/claimsflow-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: API_PREFIX
              value: api
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: claimsflow-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: claimsflow-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: 1000m, memory: 1024Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: claimsflow-backend
  namespace: claimsflow
spec:
  type: ClusterIP
  selector:
    app: claimsflow
    component: backend
  ports:
    - name: http
      port: 80
      targetPort: 4000
