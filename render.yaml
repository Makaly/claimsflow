databases:
  - name: claimsflow-db
    databaseName: cic_claims
    user: claimsflow
    plan: free

services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: claimsflow-redis
    plan: free
    maxmemoryPolicy: noeviction

  # ── Backend API (NestJS) ───────────────────────────────────────────────────
  - type: web
    name: claimsflow-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.prod
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 4000

      - key: API_PREFIX
        value: api

      # Database — auto-wired from managed Postgres
      - key: DATABASE_URL
        fromDatabase:
          name: claimsflow-db
          property: connectionString

      # Redis — auto-wired from managed Redis
      - key: REDIS_HOST
        fromService:
          name: claimsflow-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: claimsflow-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: claimsflow-redis
          type: redis
          property: password

      # Auth — Render generates a random value on first deploy
      - key: JWT_SECRET
        generateValue: true
      # JWT_EXPIRES_IN must match the cookie maxAge in auth.controller.ts
      # (24h). A longer JWT expiry would mean a leaked token outlives the
      # cookie and stays valid after logout (revocation today is by expiry
      # only — there is no server-side revocation list).
      - key: JWT_EXPIRES_IN
        value: 1d

      # Field-level encryption for GDPR Art. 9 / KDPA s.44 special-category
      # data (diagnosis, treatment, OCR extracts). Render generates a unique
      # 32-byte hex key on first deploy; rotating it requires a key-wrap
      # migration so do not regenerate this value casually.
      - key: DATA_ENCRYPTION_KEY
        generateValue: true

      # CORS — must match the frontend service URL
      - key: FRONTEND_URL
        value: https://claimsflow-frontend.onrender.com

      # Email (fill in via Render dashboard)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false       # set manually in Render dashboard
      - key: SMTP_PASSWORD
        sync: false
      # SMTP_FROM — set to same value as SMTP_USER in Render dashboard
      - key: SMTP_FROM
        sync: false

      # File uploads
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: UPLOAD_DIR
        value: /tmp/uploads   # ephemeral — use object storage for persistence

      # AI / OCR — non-secret config (set keys via Render dashboard)
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: VISION_DEFAULT_PROVIDER
        value: gemini
      - key: CLASSIFIER_AI_PROVIDER
        value: auto
      - key: OCR_USE_PAGE_HINTS
        value: "true"
      - key: TESSERACT_LANG
        value: eng
      # ANTHROPIC_API_KEY — set manually in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      # GEMINI_API_KEY — set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false

  # ── Frontend (React/Vite static site) ─────────────────────────────────────
  - type: web
    name: claimsflow-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # Render's static CDN does not proxy HTTP to external URLs, so there is
      # no /api/* or /socket.io/* rewrite here. The frontend calls the backend
      # directly via VITE_API_URL. The SPA catch-all must be the only rule.
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Pin the Node runtime — lockfileVersion 3 requires npm >=7 (Node >=16)
      # Using Node 20 LTS to match local dev and Dockerfile.
      - key: NODE_VERSION
        value: 20.19.4
      # Absolute backend URL — required because the Render static CDN cannot
      # proxy /api/* HTTP requests. installFetchProxy() and axios both use
      # this to route API calls directly to the backend service.
      # In dev the Vite proxy handles /api/* so .env.local keeps VITE_API_URL=/api.
      - key: VITE_API_URL
        value: https://claimsflow-backend.onrender.com/api
