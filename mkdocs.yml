site_name: ClaimsFlow
site_description: AI-assisted medical claims automation for CIC Insurance Group PLC.
site_author: CIC Insurance Group PLC
repo_url: https://github.com/cic-insurance/claims
edit_uri: edit/master/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Architecture:
      - Overview: architecture/overview.md
      - SRD analysis: architecture/SRD_ANALYSIS_SUMMARY.md
      - SRD roadmap: architecture/SRD_IMPLEMENTATION_ROADMAP.md
  - Testing: testing.md
  - API reference: api.md
  - Security: security.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cic-insurance/claims
