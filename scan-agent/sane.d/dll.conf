# ClaimsFlow scan-agent — curated SANE backend list.
# Loading the full system dll.conf adds 40+ backends that probe USB/SNMP/WSD
# on every scanimage -L call, inflating listing time to ~9 seconds.
# The scan agent sets SANE_CONFIG_DIR to this directory so the system
# /etc/sane.d/dll.conf is bypassed entirely.
airscan     # eSCL + WSD network scanners (RICOH, Canon, HP, Epson, Brother…)
kds_i2000   # Kodak Alaris i2000-series USB document scanners
kodakaio    # Kodak consumer/AIO inkjet scanners (USB + SNMP network)
