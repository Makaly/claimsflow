# ClaimsFlow scan-agent — airscan (eSCL/WSD) configuration.
# The RICOH is pinned by static IP so WSD re-discovery is skipped.
# Dynamic discovery is kept enabled as a fallback for other scanners.

[devices]
"RICOH MP C4503 E174M430907" = http://192.168.1.240, wsd

[options]
discovery = enable
ws-discovery = off
